name: Release Relay plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Relay/package-lock.json

      - name: Choose artifact source
        id: src
        run: |
          if [ -d "release-assets/${GITHUB_REF_NAME}" ] \
             && [ -f "release-assets/${GITHUB_REF_NAME}/main.js" ] \
             && [ -f "release-assets/${GITHUB_REF_NAME}/manifest.json" ]; then
            echo "mode=prestaged" >> $GITHUB_OUTPUT
          else
            echo "mode=build" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.src.outputs.mode == 'build'
        working-directory: Relay
        run: npm ci

      - name: Build (production)
        if: steps.src.outputs.mode == 'build'
        working-directory: Relay
        run: npm run release

      - name: Collect release artifacts
        run: |
          mkdir -p dist
          if [ "${{ steps.src.outputs.mode }}" = "prestaged" ]; then
            echo "Using pre-staged artifacts from release-assets/${GITHUB_REF_NAME}/"
            cp "release-assets/${GITHUB_REF_NAME}/main.js"      dist/
            cp "release-assets/${GITHUB_REF_NAME}/manifest.json" dist/
            [ -f "release-assets/${GITHUB_REF_NAME}/styles.css" ] && cp "release-assets/${GITHUB_REF_NAME}/styles.css" dist/
          else
            echo "Using freshly-built artifacts from Relay/"
            cp Relay/main.js Relay/manifest.json dist/
            [ -f Relay/styles.css ] && cp Relay/styles.css dist/
          fi
          cd dist && zip "../relay-${GITHUB_REF_NAME}.zip" *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
            relay-${{ github.ref_name }}.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
